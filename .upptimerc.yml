owner: Makeshapes
repo: status

sites:
  - name: API (apiv2)
    url: https://api.makeshapes.com/v3/health
  - name: YJS (collab)
    url: https://yjs.prod.makeshapes.com/v3/health
  - name: Socket.IO (sessions)
    url: https://socketio.prod.makeshapes.com/health
  - name: Experience (app)
    url: https://app.makeshapes.com
  - name: Creator
    url: https://creator.makeshapes.com

status-website:
  cname: status.makeshapes.com
  name: Makeshapes Status
  introTitle: "Makeshapes Status"
  introMessage: "Public uptime and incident status for Makeshapes services."
  logoUrl: https://cdn.prod.website-files.com/62b4430c0c89b64eece8631c/62b5b7ec7b411927837217bf_Makeshapes.svg
  favicon: https://cdn.prod.website-files.com/62b4430c0c89b64eece8631c/62b461cd1ef620cb5ffc9f8f_logo.svg
  theme: light
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/Makeshapes/status
  js: |
    (function() {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
      document.head.appendChild(link);
    })();
  css: |
    :root {
      --ms-blue: #3452bd;
      --ms-light-blue: #71b4eb;
      --ms-orange: #f0813c;
      --ms-black: #030303;
    }
    body, .navbar, .footer, h1, h2, h3, h4, h5, h6, p, span, a, button, .button {
      font-family: 'Inter', 'sofia-pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }
    a, a:hover, .link, .navbar a {
      color: var(--ms-blue);
    }
    .button, button[type="submit"], .btn-primary {
      background-color: var(--ms-blue) !important;
      border-color: var(--ms-blue) !important;
      color: #fff !important;
    }
    .button:hover, button[type="submit"]:hover, .btn-primary:hover {
      background-color: var(--ms-black) !important;
      border-color: var(--ms-black) !important;
    }
    .status-up, .status-up *, [class*="up"] .icon {
      color: var(--ms-blue) !important;
    }
    .status-down, [class*="down"] .icon {
      color: var(--ms-orange) !important;
    }
    .navbar {
      border-bottom: 1px solid #eef0f4;
    }
    .navbar .logo img {
      max-height: 32px;
      width: auto;
    }
    .container, .card {
      border-radius: 8px;
    }

notifications:
  - type: slack
    channel: status
    icon: ":rotating_light:"
    name: Upptime
